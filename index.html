<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Game</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .cricket-game {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #2F578A;
        }

        h1 {
            font-size: 3rem;
            color: #121358;
            margin-bottom: 30px;
        }

        .button-container button {
            padding: 20px 50px;
            border-radius: 25px;
            border: none;
            margin: 0 15px;
            background-color: #36ADA3;
            color: #232F72;
            font-size: 1.3rem;
            font-weight: 600;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #50b1a9;
            transform: scale(1.04);
        }

        button:active {
            transform: scale(0.9);
        }
    </style>
</head>

<body>
    <div class="cricket-game">
        <h1>Bat Ball Stumps Cricket Game</h1>
        <div class="button-container">

            <!-- =================== Bat section ========================= -->

            <button class="bat" onclick="            
            let randomNumber = Math.random() * 3; // It generate randon number between 0 - 3 everytime
            let compChoice;

            if(randomNumber > 0 && randomNumber <= 1) {
                compChoice = 'Bat';
            } else if(randomNumber > 1 && randomNumber <= 2) {
                compChoice = 'Ball'
            } else {
                compChoice = 'Stumps';
            }

            let resultMsg;
            
            if(compChoice === 'Bat') {
                resultMsg = `It's a tie`;
            } else if(compChoice === 'Ball') {
                resultMsg = `You won`;
            } else if(compChoice === 'Stumps') {
                resultMsg = `Computer has won`;   
            }
            
            alert(`You have chosen Bat\nComputer Choice is ${compChoice}\n${resultMsg}`);
            
            ">Bat</button>

            <!-- ====================== Ball Section ================================ -->
              
            <button class="ball" onclick="  
            randomNumber = Math.random() * 3; // It generate randon number between 0 - 3 everytime

            if(randomNumber > 0 && randomNumber <= 1) {
                compChoice = 'Bat';
            } else if(randomNumber > 1 && randomNumber <= 2) {
                compChoice = 'Ball'
            } else {
                compChoice = 'Stumps';
            }
            
            if(compChoice === 'Ball') {
                resultMsg = `It's a tie`;
            } else if(compChoice === 'Stumps') {
                resultMsg = `You won`;
            } else if(compChoice === 'Bat') {
                resultMsg = `Computer has won`;   
            }
            
            alert(`You have chosen Ball\nComputer Choice is ${compChoice}\n${resultMsg}`);
            
            ">Ball</button>

            <!-- ======================== Stumps section -->

            <button class="stumps" onclick="  
            randomNumber = Math.random() * 3; // It generate randon number between 0 - 3 everytime

            if(randomNumber > 0 && randomNumber <= 1) {
                compChoice = 'Bat';
            } else if(randomNumber > 1 && randomNumber <= 2) {
                compChoice = 'Ball'
            } else {
                compChoice = 'Stumps';
            }
            
            if(compChoice === 'Stumps') {
                resultMsg = `It's a tie`;
            } else if(compChoice === 'Bat') {
                resultMsg = `You won`;
            } else if(compChoice === 'Ball') {
                resultMsg = `Computer has won`;   
            }
            
            alert(`You have chosen Stumps\nComputer Choice is ${compChoice}\n${resultMsg}`);
            
            ">Stumps</button>
        </div>
    </div>
</body>

</html>
